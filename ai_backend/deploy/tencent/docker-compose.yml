services:
  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: pregnancy-ai-backend:latest
    container_name: pregnancy-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=8787
    expose:
      - "8787"

  caddy:
    image: caddy:2.10-alpine
    container_name: pregnancy-ai-caddy
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
