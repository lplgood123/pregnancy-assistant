<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="60" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">新增记录</text>
  <text x="24" y="80" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">也可以直接在对话里说一句话</text>

  <!-- Tabs -->
  <rect x="24" y="94" width="120" height="28" rx="10" fill="#F07A6A"/>
  <text x="48" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">检查记录</text>
  <rect x="150" y="94" width="120" height="28" rx="10" fill="#F1E9E3"/>
  <text x="180" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">用药/补剂</text>

  <!-- Form card -->
  <g filter="url(#shadow)">
    <rect x="20" y="136" width="350" height="520" rx="16" fill="#FFFFFF"/>
  </g>

  <text x="36" y="162" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">检查类型</text>
  <rect x="36" y="172" width="300" height="38" rx="10" fill="#F7F0EB"/>
  <text x="48" y="196" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">妊娠三项</text>

  <text x="36" y="224" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">日期</text>
  <rect x="36" y="234" width="300" height="38" rx="10" fill="#F7F0EB"/>
  <text x="48" y="258" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">2026-02-23</text>

  <text x="36" y="286" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">结果录入</text>
  <rect x="36" y="296" width="300" height="90" rx="10" fill="#F7F0EB"/>
  <text x="48" y="320" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 12000
孕酮 18
E2 320</text>

  <text x="36" y="400" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">参考范围（来自报告单）</text>
  <rect x="36" y="410" width="300" height="90" rx="10" fill="#F7F0EB"/>
  <text x="48" y="434" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 8000-15000
孕酮 10-20
E2 200-400</text>

  <text x="36" y="514" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">备注</text>
  <rect x="36" y="524" width="300" height="60" rx="10" fill="#F7F0EB"/>
  <text x="48" y="548" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">市妇幼 · 例行检查</text>

  <!-- Submit -->
  <g filter="url(#shadow)">
    <rect x="20" y="682" width="350" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="154" y="714" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#FFFFFF">保存记录</text>
