<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="58" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">孕期健康伙伴</text>
  <text x="24" y="78" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">像聊天一样记录与提醒</text>

  <!-- Assistant bubble 1 -->
  <g filter="url(#shadow)">
    <rect x="20" y="98" width="320" height="92" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="128" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">早安～今天宝宝的“任务清单”</text>
  <text x="36" y="150" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">有 3 件，我帮你排好了哦。</text>

  <!-- User bubble 1 -->
  <g filter="url(#shadow)">
    <rect x="120" y="202" width="250" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="138" y="234" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#FFFFFF">好的，给我看看</text>

  <!-- Assistant bubble with embedded cards -->
  <g filter="url(#shadow)">
    <rect x="20" y="272" width="330" height="210" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="300" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">今日重点：我们一口气搞定它们</text>

  <rect x="36" y="316" width="298" height="58" rx="12" fill="#F7F0EB"/>
  <text x="50" y="340" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">下一个提醒</text>
  <text x="50" y="360" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">晚饭后 20 分钟 · 钙片</text>

  <rect x="36" y="380" width="298" height="58" rx="12" fill="#F7F0EB"/>
  <text x="50" y="404" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">注意事项</text>
  <text x="50" y="424" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">补水 1500ml · 散步 20 分钟</text>

  <!-- Assistant bubble 2 -->
  <g filter="url(#shadow)">
    <rect x="20" y="498" width="300" height="78" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="526" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">要不要我把“用药清单”也</text>
  <text x="36" y="548" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">整理成一张卡，随时点开？</text>

  <!-- User bubble 2 -->
  <g filter="url(#shadow)">
    <rect x="150" y="590" width="220" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="168" y="622" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#FFFFFF">要的呀，辛苦你啦</text>

  <!-- Fixed quick cards bar -->
  <g filter="url(#shadow)">
    <rect x="12" y="664" width="366" height="64" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="24" y="684" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#A0948B">常用卡片（左右滑动）</text>

  <rect x="24" y="694" width="82" height="28" rx="10" fill="#F1E9E3"/>
  <text x="38" y="713" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">今天计划</text>
  <rect x="112" y="694" width="82" height="28" rx="10" fill="#F1E9E3"/>
  <text x="128" y="713" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">用药清单</text>
  <rect x="200" y="694" width="82" height="28" rx="10" fill="#F1E9E3"/>
  <text x="216" y="713" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">产检预约</text>
  <rect x="288" y="694" width="82" height="28" rx="10" fill="#F1E9E3"/>
  <text x="304" y="713" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">检查记录</text>
  <!-- partially offscreen pill to imply scroll -->
  <rect x="376" y="694" width="82" height="28" rx="10" fill="#F1E9E3"/>

  <!-- Input bar -->
  <g filter="url(#shadow)">
    <rect x="20" y="742" width="350" height="56" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="36" y="776" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#A0948B">像聊天一样告诉我：今晚饭后吃钙片</text>
  <rect x="298" y="754" width="64" height="34" rx="12" fill="#F07A6A"/>
  <text x="314" y="776" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">发送</text>
</svg>
