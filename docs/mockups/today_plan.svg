<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="60" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">今天计划</text>
  <text x="24" y="80" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">把今天安排得明明白白</text>

  <!-- Summary card -->
  <g filter="url(#shadow)">
    <rect x="20" y="110" width="350" height="80" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="138" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">今日摘要</text>
  <text x="36" y="164" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#3B2F2A">共 5 件事，已完成 2 件</text>

  <!-- Plan list -->
  <g filter="url(#shadow)">
    <rect x="20" y="206" width="350" height="420" rx="16" fill="#FFFFFF"/>
  </g>

  <!-- Items -->
  <text x="36" y="236" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">08:20 · 用药 · 叶酸</text>
  <text x="36" y="266" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">10:00 · 习惯 · 散步 20 分钟</text>
  <text x="36" y="296" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">12:30 · 用药 · 钙片</text>
  <text x="36" y="326" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">15:00 · 习惯 · 补水 1500ml</text>
  <text x="36" y="356" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">18:50 · 用药 · 钙片</text>

  <!-- Checkboxes -->
  <circle cx="330" cy="238" r="8" fill="#5CA9A7"/>
  <circle cx="330" cy="268" r="8" fill="#5CA9A7"/>
  <circle cx="330" cy="298" r="8" fill="#E6D8CD"/>
  <circle cx="330" cy="328" r="8" fill="#E6D8CD"/>
  <circle cx="330" cy="358" r="8" fill="#E6D8CD"/>

  <!-- CTA -->
  <g filter="url(#shadow)">
    <rect x="20" y="748" width="350" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="148" y="780" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#FFFFFF">新增今日事项</text>
</svg>
