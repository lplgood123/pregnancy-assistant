<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCEFE6"/>
      <stop offset="100%" stop-color="#F5F2EE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="390" height="48" fill="transparent"/>
  <text x="24" y="32" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#6F5E55">9:41</text>

  <!-- Header -->
  <text x="24" y="84" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="24" font-weight="700" fill="#3B2F2A">孕周 18+3</text>
  <text x="24" y="108" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#7A6A61">距离预产期 126 天</text>

  <!-- Today care card -->
  <g filter="url(#shadow)">
    <rect x="20" y="128" width="350" height="90" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="166" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="16" font-weight="600" fill="#3B2F2A">早安，今天还有 3 件事</text>
  <text x="36" y="190" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">完成后我会帮你记录</text>
