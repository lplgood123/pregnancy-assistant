  <text x="36" y="568" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">HCG 12000 / P 18 / E2 320</text>
  <text x="36" y="592" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">较上次：HCG ↑  P →  E2 ↑</text>

