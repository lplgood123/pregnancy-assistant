  <text x="36" y="260" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">下一个提醒</text>
  <text x="36" y="288" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">晚饭后 20 分钟 · 钙片</text>
  <text x="36" y="312" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">预计 18:50 提醒</text>
