  <text x="48" y="342" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">已服用</text>
  <rect x="136" y="322" width="76" height="28" rx="10" fill="#F1E9E3"/>
  <text x="148" y="342" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">调整</text>

