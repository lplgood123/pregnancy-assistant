  <g filter="url(#shadow)">
    <rect x="20" y="758" width="350" height="56" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="36" y="792" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#A0948B">说一句话就能记录，如：晚饭后吃钙片</text>
  <rect x="298" y="770" width="64" height="34" rx="12" fill="#F07A6A"/>
  <text x="314" y="792" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">发送</text>
</svg>
