  <g filter="url(#shadow)">
    <rect x="20" y="642" width="350" height="96" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="668" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" font-weight="600" fill="#3B2F2A">快速记录</text>
  <rect x="36" y="684" width="86" height="28" rx="10" fill="#F1E9E3"/>
  <text x="46" y="703" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">妊娠三项</text>
  <rect x="128" y="684" width="86" height="28" rx="10" fill="#F1E9E3"/>
  <text x="140" y="703" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">产检预约</text>
