  <text x="36" y="276" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">18:50 · 钙片（待完成）</text>
  <text x="36" y="300" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">20:30 · 叶酸（已完成）</text>

