  <text x="36" y="442" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">妊娠三项 · 2026-02-23</text>
  <text x="36" y="466" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 12000 / P 18 / E2 320</text>

