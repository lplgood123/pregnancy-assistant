<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="60" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">检查记录</text>
  <text x="24" y="80" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">按时间查看你的检查历史</text>

  <!-- Filter chips -->
  <rect x="24" y="94" width="70" height="26" rx="10" fill="#F07A6A"/>
  <text x="40" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">全部</text>
  <rect x="100" y="94" width="80" height="26" rx="10" fill="#F1E9E3"/>
  <text x="118" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">妊娠三项</text>
  <rect x="186" y="94" width="60" height="26" rx="10" fill="#F1E9E3"/>
  <text x="200" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">NT</text>
  <rect x="252" y="94" width="70" height="26" rx="10" fill="#F1E9E3"/>
  <text x="268" y="112" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">唐筛</text>

  <!-- List cards -->
  <g filter="url(#shadow)">
    <rect x="20" y="136" width="350" height="128" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="162" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">妊娠三项 · 2026-02-23</text>
  <text x="36" y="188" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#3B2F2A">HCG 12000 / P 18 / E2 320</text>
  <text x="36" y="210" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">差异值：HCG +3000 / P +2 / E2 +40</text>
  <text x="36" y="230" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 翻倍：1.33x</text>

  <g filter="url(#shadow)">
    <rect x="20" y="276" width="350" height="128" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="302" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">妊娠三项 · 2026-02-10</text>
  <text x="36" y="328" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#3B2F2A">HCG 9000 / P 16 / E2 280</text>
  <text x="36" y="350" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">差异值：HCG +2000 / P +1 / E2 +20</text>
  <text x="36" y="370" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 翻倍：1.18x</text>

  <g filter="url(#shadow)">
    <rect x="20" y="416" width="350" height="116" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="442" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">NT · 2026-02-05</text>
  <text x="36" y="468" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#3B2F2A">透明带厚度 1.4 mm</text>
  <text x="36" y="490" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">参考范围内</text>

  <!-- Add record button -->
  <g filter="url(#shadow)">
    <rect x="20" y="748" width="350" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="132" y="780" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#FFFFFF">新增检查记录</text>
</svg>
