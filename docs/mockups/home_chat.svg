<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="58" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">孕期健康伙伴</text>
  <text x="24" y="78" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">对话中记录、提醒与关怀</text>

  <!-- Assistant bubble -->
  <g filter="url(#shadow)">
    <rect x="20" y="100" width="300" height="82" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="130" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">早安，今天还有 3 件事需要提醒。</text>
  <text x="36" y="152" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">要我先帮你列出来吗？</text>

  <!-- User bubble -->
  <g filter="url(#shadow)">
    <rect x="90" y="196" width="280" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="108" y="228" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#FFFFFF">帮我列一下吧</text>

  <!-- Assistant bubble with cards -->
  <g filter="url(#shadow)">
    <rect x="20" y="266" width="330" height="198" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="296" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">好的，这是今天的重点事项：</text>

  <!-- Embedded card 1 -->
  <rect x="36" y="312" width="298" height="56" rx="12" fill="#F7F0EB"/>
  <text x="50" y="336" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">下一个提醒</text>
  <text x="50" y="356" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">晚饭后 20 分钟 · 钙片</text>

  <!-- Embedded card 2 -->
  <rect x="36" y="376" width="298" height="56" rx="12" fill="#F7F0EB"/>
  <text x="50" y="400" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">注意事项</text>
  <text x="50" y="420" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">补水 1500ml · 散步 20 分钟</text>

  <!-- Assistant follow-up bubble -->
  <g filter="url(#shadow)">
    <rect x="20" y="484" width="300" height="68" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="512" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#5B4C44">需要我提醒你补水吗？</text>

  <!-- User bubble -->
  <g filter="url(#shadow)">
    <rect x="140" y="566" width="230" height="52" rx="16" fill="#F07A6A"/>
  </g>
  <text x="158" y="598" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#FFFFFF">需要，下午两点提醒</text>

  <!-- Quick action row -->
  <text x="24" y="648" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">快捷操作</text>
  <rect x="24" y="660" width="90" height="28" rx="10" fill="#F1E9E3"/>
  <text x="36" y="679" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">妊娠三项</text>
  <rect x="120" y="660" width="90" height="28" rx="10" fill="#F1E9E3"/>
  <text x="134" y="679" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">产检预约</text>
  <rect x="216" y="660" width="90" height="28" rx="10" fill="#F1E9E3"/>
  <text x="230" y="679" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#7A6A61">用药/补剂</text>

  <!-- Input bar -->
  <g filter="url(#shadow)">
    <rect x="20" y="738" width="350" height="56" rx="18" fill="#FFFFFF"/>
  </g>
  <text x="36" y="772" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#A0948B">像聊天一样告诉我：今晚饭后吃钙片</text>
  <rect x="298" y="750" width="64" height="34" rx="12" fill="#F07A6A"/>
  <text x="314" y="772" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#FFFFFF">发送</text>
</svg>
