<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="60" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">我的档案</text>
  <text x="24" y="80" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">调整时间设置，让提醒更准确</text>

  <!-- Pregnancy info card -->
  <g filter="url(#shadow)">
    <rect x="20" y="110" width="350" height="120" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="136" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">孕期信息</text>
  <text x="36" y="160" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">预产期：2026-08-05</text>
  <text x="36" y="184" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">末次月经：2025-10-29</text>

  <!-- Meal & sleep card -->
  <g filter="url(#shadow)">
    <rect x="20" y="246" width="350" height="170" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="272" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">三餐与作息</text>
  <text x="36" y="298" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">早餐：08:00</text>
  <text x="36" y="322" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">午餐：12:30</text>
  <text x="36" y="346" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">晚餐：18:30</text>
  <text x="36" y="370" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">睡觉：22:30</text>

  <!-- Health info card -->
  <g filter="url(#shadow)">
    <rect x="20" y="432" width="350" height="150" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="458" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">健康信息</text>
  <text x="36" y="484" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">过敏史：无</text>
  <text x="36" y="508" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">身高体重：165cm / 54kg</text>
  <text x="36" y="532" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#3B2F2A">主治医生：张医生</text>

  <!-- Edit button -->
  <g filter="url(#shadow)">
    <rect x="20" y="610" width="350" height="52" rx="16" fill="#F1E9E3"/>
  </g>
  <text x="154" y="642" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#7A6A61">编辑资料</text>

  <!-- Tip -->
  <text x="24" y="690" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#A0948B">小提示：三餐/睡觉时间决定提醒时间哦</text>
</svg>
