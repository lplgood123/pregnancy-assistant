<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9EFE7"/>
      <stop offset="100%" stop-color="#F2EEE9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#C9B7A6" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Header -->
  <text x="24" y="60" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="18" font-weight="700" fill="#3B2F2A">妊娠三项详情</text>
  <text x="24" y="80" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#8B7A70">2026-02-23 · 有参考范围</text>

  <!-- Summary card -->
  <g filter="url(#shadow)">
    <rect x="20" y="100" width="350" height="110" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="128" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">本次结果</text>
  <text x="36" y="154" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="15" font-weight="600" fill="#3B2F2A">HCG 12000 / P 18 / E2 320</text>
  <text x="36" y="178" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">结论：范围内</text>

  <!-- Trend card -->
  <g filter="url(#shadow)">
    <rect x="20" y="226" width="350" height="170" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="252" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">与上次对比</text>
  <text x="36" y="276" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">差异值（本次 - 上次）</text>
  <text x="36" y="298" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" font-weight="600" fill="#3B2F2A">HCG +3000 / P +2 / E2 +40</text>
  <text x="36" y="322" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">变化：HCG ↑ / P ↑ / E2 ↑</text>
  <text x="36" y="344" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG 翻倍：1.33x（本次/上次）</text>

  <!-- Reference range card -->
  <g filter="url(#shadow)">
    <rect x="20" y="412" width="350" height="180" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="438" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">参考范围（来自报告单）</text>
  <text x="36" y="464" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">HCG：8000 - 15000</text>
  <text x="36" y="488" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">孕酮：10 - 20</text>
  <text x="36" y="512" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">E2：200 - 400</text>
  <text x="36" y="538" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="11" fill="#A0948B">仅供参考，如有疑问请咨询医生</text>

  <!-- Note card -->
  <g filter="url(#shadow)">
    <rect x="20" y="608" width="350" height="110" rx="16" fill="#FFFFFF"/>
  </g>
  <text x="36" y="634" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="13" fill="#8B7A70">备注</text>
  <text x="36" y="660" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="12" fill="#7A6A61">市妇幼 · 例行检查</text>

  <!-- Bottom action -->
  <g filter="url(#shadow)">
    <rect x="20" y="738" width="350" height="52" rx="16" fill="#F1E9E3"/>
  </g>
  <text x="148" y="770" font-family="'Noto Sans SC','PingFang SC','Helvetica Neue',sans-serif" font-size="14" fill="#7A6A61">编辑记录</text>
</svg>
