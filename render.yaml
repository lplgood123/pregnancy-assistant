services:
  - type: web
    name: pregnancy-ai-backend
    plan: free
    runtime: python
    rootDir: ai_backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -w 1 --threads 4 -b 0.0.0.0:$PORT --timeout 75 --graceful-timeout 30 --keep-alive 5
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_BASE_URL
        value: https://api.minimax.io/v1
      - key: MINIMAX_MODEL
        value: MiniMax-M2.5
      - key: MINIMAX_TIMEOUT_SECONDS
        value: "45"
      - key: MINIMAX_CONNECT_TIMEOUT_SECONDS
        value: "8"
      - key: MINIMAX_READ_TIMEOUT_SECONDS
        value: "35"
      - key: MINIMAX_MAX_ATTEMPTS
        value: "2"
      - key: MINIMAX_RETRY_BACKOFF_SECONDS
        value: "0.8"
      - key: AI_BACKEND_TOKEN
        sync: false
      - key: APP_TIMEZONE
        value: Asia/Shanghai
